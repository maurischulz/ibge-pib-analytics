config-version: 2
version: '1.0.0'
name: 'ibge_analytics'
profile: 'dbt'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ibge_analytics:
    staging:
      +materialized: table
      +schema: stg
    marts:
      +materialized: table
      +schema: marts

seeds:
  ibge_analytics:
    +schema: stg
